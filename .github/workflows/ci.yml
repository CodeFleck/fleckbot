name: Fleckbot CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Verify Maven project compiles
        run: mvn -B -ntp -DskipTests package

      - name: Run unit tests (if present)
        run: mvn -B -ntp test
